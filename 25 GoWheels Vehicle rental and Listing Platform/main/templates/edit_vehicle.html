{% extends 'base.html' %}

{% block title %}Edit {{ vehicle.vehicle_name }} | GoWheels{% endblock %}

{% block extra_css %}
<style>
    :root { --input-bg: #1a1a1a; }
    body.light { --input-bg: #f0f0f0; }

    .main-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 120px 20px 60px; }
    .edit-card {
      background: var(--bg-card); width: 100%; max-width: 800px;
      border-radius: 24px; padding: 40px; border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    h2 { font-size: 1.8rem; color: var(--text-main); margin-bottom: 5px; font-family: 'Poppins', sans-serif; }
    p.desc { color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; font-family: 'Open Sans', sans-serif; }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); font-family: 'Open Sans', sans-serif; }
    
    .input-group input, .input-group select {
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--input-bg); color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s; font-family: 'Open Sans', sans-serif;
    }
    .input-group input:focus, .input-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255,106,42,0.1); }

    .btn-row { display: flex; justify-content: space-between; margin-top: 30px; }
    .wizard-btn { padding: 12px 30px; border-radius: 30px; border: none; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.3s; text-decoration: none; display: inline-block; font-family: 'Open Sans', sans-serif; }
    .wizard-btn-primary { background: var(--primary); color: #fff; }
    .wizard-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--primary-glow); }
    .wizard-btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .wizard-btn-secondary:hover { border-color: var(--text-main); color: var(--text-main); }

    @media (max-width: 768px) { .input-grid { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
<div class="main-container">
  <div class="edit-card">
    <h2>Edit Vehicle Details</h2>
    <p class="desc">Update the listing information for your {{ vehicle.vehicle_name }}.</p>

    <form method="POST" action="{% url 'edit_vehicle' vehicle.id %}">
      {% csrf_token %}

      <div class="input-grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="input-group">
          <label>Vehicle Name & Model</label>
          <input type="text" name="vehicle_name" value="{{ vehicle.vehicle_name }}" required>
        </div>

        <div class="input-group">
          <label>Vehicle Number</label>
          <input type="text" name="vehicle_number" value="{{ vehicle.vehicle_number|default:'' }}" placeholder="e.g. MH 18 AB 1234">
        </div>

        <div class="input-group">
          <label>Contact Number</label>
          <input type="tel" name="contact_number" value="{{ vehicle.contact_number }}" required>
        </div>
      </div>

      <div class="input-grid">
        <div class="input-group">
            <label>Type</label>
            <select name="vehicle_type" id="vType" required>
              <option value="car">Car</option>
              <option value="bike">Bike</option>
              <option value="truck">Truck</option>
             </select>
          </div>
        <div class="input-group">
          <label>Category</label>
          <select name="category" id="vCategory" required>
            <optgroup label="Cars & Four Wheelers">
              <option value="Sedan">Sedan</option>
              <option value="Hatchback">Hatchback</option>
              <option value="SUV">SUV</option>
              <option value="Crossover (CUV)">Crossover (CUV)</option>
              <option value="Coupe">Coupe</option>
              <option value="MPV/Minivan">MPV/Minivan</option>
              <option value="Convertible">Convertible</option>
              <option value="Pickup Truck">Pickup Truck</option>
            </optgroup>
            <optgroup label="Bikes & Two Wheelers">
              <option value="Standard (Naked)">Standard (Naked)</option>
              <option value="Sportbike">Sportbike</option>
              <option value="Cruiser">Cruiser</option>
              <option value="Touring">Touring</option>
              <option value="Adventure (ADV)">Adventure (ADV)</option>
              <option value="Dual-Sport">Dual-Sport</option>
              <option value="Off-Road 1 Dirt Bike">Off-Road / Dirt Bike</option>
              <option value="Scooter">Scooter</option>
              <option value="Moped">Moped</option>
              <option value="Electric Motorcycle">Electric Motorcycle</option>
            </optgroup>
            <optgroup label="Other">
              <option value="All">Other / All</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div class="input-grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="input-group">
          <label>Rent Price (per day)</label>
          <input type="number" name="price_per_day" value="{{ vehicle.price_per_day }}" required>
        </div>
        <div class="input-group">
            <label>Seats</label>
            <select name="seats" id="vSeats" required>
              <option value="2" {% if vehicle.seats == 2 %}selected{% endif %}>2</option>
              <option value="4" {% if vehicle.seats == 4 %}selected{% endif %}>4</option>
              <option value="5" {% if vehicle.seats == 5 %}selected{% endif %}>5</option>
              <option value="7" {% if vehicle.seats == 7 %}selected{% endif %}>7</option>
              <option value="8" {% if vehicle.seats == 8 %}selected{% endif %}>8</option>
              <option value="12" {% if vehicle.seats == 12 %}selected{% endif %}>12+</option>
            </select>
          </div>

          <div class="input-group">
            <label>Fuel</label>
            <select name="fuel_type" id="vFuel" required>
              <option value="Petrol" {% if vehicle.fuel_type == 'Petrol' %}selected{% endif %}>Petrol</option>
              <option value="Diesel" {% if vehicle.fuel_type == 'Diesel' %}selected{% endif %}>Diesel</option>
              <option value="Electric" {% if vehicle.fuel_type == 'Electric' %}selected{% endif %}>Electric</option>
              <option value="Hybrid" {% if vehicle.fuel_type == 'Hybrid' %}selected{% endif %}>Hybrid</option>
              <option value="CNG" {% if vehicle.fuel_type == 'CNG' %}selected{% endif %}>CNG</option>
            </select>
          </div>
      </div>

      <div class="input-group">
        <label>Pickup Location</label>
        <input type="text" name="pickup_location" value="{{ vehicle.pickup_location|default:'' }}" placeholder="City (Optional)">
      </div>

      <div class="btn-row">
        <a href="{% url 'your_vehicles' %}" class="wizard-btn wizard-btn-secondary">Cancel</a>
        <button type="submit" class="wizard-btn wizard-btn-primary">Save Changes <i class="bi bi-check-lg"></i></button>
      </div>

    </form>
  </div>
</div>

<script>
  // Auto-select dropdown values based on database data
  document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("vType").value = "{{ vehicle.vehicle_type }}";
    document.getElementById("vCategory").value = "{{ vehicle.category }}";
    document.getElementById("vSeats").value = "{{ vehicle.seats }}";
    document.getElementById("vFuel").value = "{{ vehicle.fuel_type }}";
  });
</script>
{% endblock %}
