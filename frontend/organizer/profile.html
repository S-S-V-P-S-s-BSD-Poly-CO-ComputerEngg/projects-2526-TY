<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Profile | Organizer Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-custom p-5">
                    <div class="d-flex align-items-center mb-4">
                        <i class="fas fa-user-tie fa-5x text-primary me-4"></i>
                        <div>
                            <h2 class="fw-bold mb-0" id="adminName">Loading...</h2>
                            <span class="badge bg-primary">System Administrator</span>
                        </div>
                    </div>
                    
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <div class="p-3 bg-light rounded-3 mb-3 border">
                                <label class="small text-muted d-block">Admin Email Address</label>
                                <span class="fw-bold" id="adminEmail">---</span>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="p-3 bg-light rounded-3 mb-3 border">
                                <label class="small text-muted d-block">Access Level</label>
                                <span class="fw-bold text-danger">Full Access (Create, Override, Block)</span>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-info mt-3 small">
                        <i class="fas fa-info-circle me-2"></i> As an organizer, you are responsible for setting accurate geofence coordinates.
                    </div>

                    <div class="mt-4">
                        <a href="dashboard.html" class="btn-auth text-center text-decoration-none d-inline-block w-auto px-5">Go to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if(!user || user.role !== 'organizer') window.location.href = '../index.html';

            document.getElementById('adminName').innerText = user.name;
            document.getElementById('adminEmail').innerText = user.email;
        }
    </script>
</body>
</html>
