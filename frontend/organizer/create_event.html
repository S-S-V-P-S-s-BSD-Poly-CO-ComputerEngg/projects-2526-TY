<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Event | Geo-Track Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card border-0 shadow-lg p-4 mx-auto" style="max-width: 700px;">
            <h3 class="fw-bold mb-4"><i class="fas fa-map-marked-alt text-accent me-2"></i>Setup New Geofence Event</h3>
            
            <form id="eventForm">
                <div class="mb-3">
                    <label class="form-label">Event Name</label>
                    <input type="text" id="eventName" class="form-control" placeholder="e.g. Annual Seminar 2024" required>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Latitude</label>
                        <input type="text" id="lat" class="form-control" placeholder="Fetching..." readonly required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Longitude</label>
                        <input type="text" id="lng" class="form-control" placeholder="Fetching..." readonly required>
                    </div>
                </div>

                <button type="button" class="btn btn-outline-primary w-100 mb-4" onclick="fetchLocation()">
                    <i class="fas fa-crosshairs me-2"></i> GET CURRENT LOCATION AS CENTER
                </button>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Geofence Radius (Meters)</label>
                        <input type="number" id="radius" class="form-control" value="50" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Time Window (Minutes)</label>
                        <input type="number" id="window" class="form-control" value="60" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Event Description</label>
                    <textarea id="desc" class="form-control" rows="3"></textarea>
                </div>

                <button type="submit" class="btn-auth">CREATE & BROADCAST EVENT</button>
                <a href="dashboard.html" class="btn btn-link w-100 mt-2 text-decoration-none">Back to Monitor</a>
            </form>
        </div>
    </div>

    <script src="../js/organizer_features.js"></script>
    <script>
        function fetchLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('lat').value = p.coords.latitude;
                document.getElementById('lng').value = p.coords.longitude;
            });
        }
    </script>
</body>
</html>
