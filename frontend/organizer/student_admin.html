<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Students | Geo-Track Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="fas fa-users-cog me-2"></i>Student Administration</h2>
            <a href="dashboard.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
        </div>
        
        <div class="card shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Registered Students List</h5>
                <div class="input-group w-50">
                    <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="studentSearch" class="form-control" placeholder="Search by ID, Name or Department..." onkeyup="filterStudents()">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>College ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentAdminTable">
                        <tr><td colspan="6" class="text-center text-muted">Fetching students...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allStudents = []; // सर्चसाठी डेटा स्टोअर करण्यासाठी

        // १. पेज लोड झाल्यावर विद्यार्थ्यांची लिस्ट लोड करणे
        window.onload = loadStudentAdmin;

        async function loadStudentAdmin() {
            try {
                const res = await fetch('http://localhost:5000/api/students');
                allStudents = await res.json();
                renderTable(allStudents);
            } catch (err) {
                console.error("Error fetching students:", err);
                document.getElementById('studentAdminTable').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Failed to load student data.</td></tr>`;
            }
        }

        // २. टेबलमध्ये डेटा रेंडर करणे
        function renderTable(data) {
            const tableBody = document.getElementById('studentAdminTable');
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center">No students found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map(s => `
                <tr>
                    <td><span class="fw-bold">${s.collegeId || 'N/A'}</span></td>
                    <td>${s.name}</td>
                    <td><small>${s.email}</small></td>
                    <td>${s.department || 'N/A'}</td>
                    <td>
                        <span class="badge ${s.status === 'active' ? 'bg-success' : 'bg-danger'}">
                            ${(s.status || 'active').toUpperCase()}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm ${s.status === 'active' ? 'btn-outline-danger' : 'btn-outline-success'}" 
                                onclick="toggleStudentStatus('${s.email}', '${s.status || 'active'}')">
                            <i class="fas ${s.status === 'active' ? 'fa-ban' : 'fa-check-circle'} me-1"></i>
                            ${s.status === 'active' ? 'Block' : 'Unblock'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ३. सर्च फिल्टर लॉजिक
        function filterStudents() {
            const searchTerm = document.getElementById('studentSearch').value.toLowerCase();
            const filtered = allStudents.filter(s => 
                s.name.toLowerCase().includes(searchTerm) || 
                s.email.toLowerCase().includes(searchTerm) ||
                (s.collegeId && s.collegeId.toString().includes(searchTerm)) ||
                (s.department && s.department.toLowerCase().includes(searchTerm))
            );
            renderTable(filtered);
        }

        // ४. स्टेटस बदलणे (Block/Unblock)
        async function toggleStudentStatus(email, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'blocked' : 'active';
            if(confirm(`Are you sure you want to ${newStatus} this student?`)) {
                try {
                    const res = await fetch('http://localhost:5000/api/update-user-status', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, status: newStatus })
                    });
                    if(res.ok) {
                        loadStudentAdmin(); // लिस्ट रिफ्रेश करा
                    } else {
                        alert("Error updating status. Make sure the API exists on server.js");
                    }
                } catch (err) {
                    alert("Server connection failed.");
                }
            }
        }
    </script>
</body>
</html>
