<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Geo-Track Pro - Advanced Geofence System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Loading Animation साठी विशेष लॉजिक */
        .loader { display: none; } 
        .btn-auth.is-loading .loader { display: inline-block; }
        .btn-auth.is-loading .btn-text { display: none; }

        /* Floating Label Customize - निळा रंग कॉम्बिनेशनसाठी */
        .form-floating > label { color: var(--text-muted); }
        .form-floating > .form-control:focus ~ label { color: var(--accent); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="brand-logo mb-2">
                    <i class="fas fa-university me-2"></i>SSVPS EVENT PORTAL
                </div>
                <h5 class="fw-bold text-uppercase tracking-wider" style="color: var(--text-dark); font-size: 0.9rem;">Secure Access Portal</h5>
                <p class="text-muted small">Please enter your credentials to continue</p>
            </div>
            
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="email" id="email" class="form-control shadow-none" placeholder="name@college.edu" required>
                    <label for="email"><i class="fas fa-envelope-open me-2"></i>Official Email</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" id="password" class="form-control shadow-none" placeholder="••••••••" required>
                    <label for="password"><i class="fas fa-shield-halved me-2"></i>Password</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Remember Session</label>
                    </div>
                    <a href="#" class="small text-accent text-decoration-none fw-bold">Forgot?</a>
                </div>

                <button type="submit" id="loginBtn" class="btn-auth d-flex align-items-center justify-content-center">
                    <span class="btn-text">SIGN IN TO SYSTEM <i class="fas fa-arrow-right-to-bracket ms-2"></i></span>
                    <div class="spinner-border spinner-border-sm ms-2 loader" id="btnLoader" role="status"></div>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted small">New to Geo-Track?</span>
                <a href="signup.html" class="fw-bold text-accent text-decoration-none ms-1">Create Advanced Account</a>
            </div>

            <div class="mt-5 text-center">
                <p class="text-muted" style="font-size: 0.7rem; opacity: 0.8;">
                    <i class="fas fa-lock me-1"></i> AES-256 Encrypted Connection <br>
                    &copy; 2026 Enterprise Attendance Management
                </p>
            </div>
        </div>
    </div>

    <script src="js/auth_handler.js"></script>
    
    <script>
        // Session Check Logic - जसा आहे तसाच ठेवला आहे
        window.addEventListener('load', () => {
            const userData = localStorage.getItem('user');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    console.log("Active Session Found:", user.role);
                    
                    if (user.role === 'student') {
                        window.location.replace('student/dashboard.html');
                    } else if (user.role === 'organizer') {
                        window.location.replace('organizer/dashboard.html');
                    }
                } catch (e) {
                    console.error("Invalid session data, clearing...");
                    localStorage.clear();
                }
            }
        });

        // Login Button Animation - जसा आहे तसाच ठेवला आहे
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.classList.add('is-loading');
            btn.disabled = true;
        });
    </script>
</body>
</html>
