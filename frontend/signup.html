<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Geo-Track Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .signup-box { border-top: 5px solid var(--success); }
        .role-card {
            cursor: pointer;
            border: 2px solid #e2e8f0;
            transition: 0.3s;
            position: relative;
        }
        .role-card.active {
            border-color: var(--accent);
            background-color: rgba(37, 99, 235, 0.05);
        }
        .role-card.active i { color: var(--accent); }
        .check-icon {
            position: absolute; top: 10px; right: 10px;
            display: none; color: var(--accent);
        }
        .role-card.active .check-icon { display: block; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card signup-box" style="max-width: 600px;">
            <div class="text-center mb-4">
                <div class="brand-logo">REGISTRATION</div>
                <h5 class="fw-bold">Create Your Professional Profile</h5>
                <p class="text-muted small">Select your role and provide your official details</p>
            </div>

            <form id="signupForm">
                <div class="row mb-4">
                    <div class="col-6">
                        <div class="role-card p-3 rounded-4 text-center active" id="roleStudent" onclick="selectRole('student')">
                            <i class="fas fa-user-graduate fa-2x mb-2"></i>
                            <div class="fw-bold">Student</div>
                            <i class="fas fa-check-circle check-icon"></i>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="role-card p-3 rounded-4 text-center" id="roleOrganizer" onclick="selectRole('organizer')">
                            <i class="fas fa-user-tie fa-2x mb-2"></i>
                            <div class="fw-bold">Organizer</div>
                            <i class="fas fa-check-circle check-icon"></i>
                        </div>
                    </div>
                </div>
                <input type="hidden" id="role" value="student">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Anup Patil" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Official Email</label>
                        <input type="email" id="email" class="form-control" placeholder="anup@college.edu" required>
                    </div>

                    <div class="col-md-6 mb-3" id="idField">
                        <label class="form-label">College ID / Roll No</label>
                        <input type="text" id="collegeId" class="form-control" placeholder="CS2026-01">
                    </div>
                    <div class="col-md-6 mb-3" id="deptField">
                        <label class="form-label">Department</label>
                        <select id="department" class="form-select" style="padding: 0.8rem; border-radius: 12px;">
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">IT</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                        </select>
                    </div>

                    <div class="col-12 mb-4">
                        <label class="form-label">Create Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" required>
                    </div>
                </div>

                <button type="submit" class="btn-auth">INITIALIZE ACCOUNT</button>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted small">Already part of the system?</span>
                <a href="index.html" class="fw-bold text-accent text-decoration-none ms-1">Login Here</a>
            </div>
        </div>
    </div>

    <script src="js/auth_handler.js"></script>
    <script>
        function selectRole(role) {
            document.getElementById('role').value = role;
            
            // Visual Update
            document.getElementById('roleStudent').classList.toggle('active', role === 'student');
            document.getElementById('roleOrganizer').classList.toggle('active', role === 'organizer');
            
            // Toggle Fields (Phase 1.1)
            const isStudent = (role === 'student');
            document.getElementById('idField').style.display = isStudent ? 'block' : 'none';
            document.getElementById('deptField').style.display = isStudent ? 'block' : 'none';
        }
    </script>
</body>
</html>
