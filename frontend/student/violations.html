<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Violation Logs | Geo-Track Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="fw-bold text-danger mb-4"><i class="fas fa-exclamation-triangle me-2"></i>Geofence Violation History</h2>
        <div class="alert alert-warning">
            Note: These are failed attendance attempts where you were outside the allowed radius.
        </div>
        <div class="card-custom">
            <table class="table">
                <thead>
                    <tr><th>Event</th><th>Distance Found</th><th>Time</th><th>Reason</th></tr>
                </thead>
                <tbody id="violationTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="../js/student_api.js"></script>
    <script>window.onload = loadViolationLogs;</script>
</body>
</html>
