<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-custom text-center p-5">
                    <div class="mb-4">
                        <i class="fas fa-user-circle fa-6x text-accent"></i>
                    </div>
                    <h2 class="fw-bold mb-1" id="dispName">Loading...</h2>
                    <p class="text-muted mb-4" id="dispRole">Student Profile</p>
                    
                    <hr>

                    <div class="row text-start mt-4">
                        <div class="col-md-6 mb-3">
                            <label class="small text-muted">Official Email</label>
                            <h6 class="fw-bold" id="dispEmail">---</h6>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="small text-muted">College ID</label>
                            <h6 class="fw-bold" id="dispID">---</h6>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="small text-muted">Department</label>
                            <h6 class="fw-bold" id="dispDept">---</h6>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="small text-muted">Account Status</label>
                            <h6 class="fw-bold text-success"><i class="fas fa-check-circle me-1"></i> Active</h6>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button class="btn btn-outline-primary px-4 me-2">Edit Profile</button>
                        <a href="dashboard.html" class="btn btn-secondary px-4">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if(!user) window.location.href = '../index.html';

            document.getElementById('dispName').innerText = user.name;
            document.getElementById('dispEmail').innerText = user.email;
            document.getElementById('dispID').innerText = user.collegeId || 'N/A';
            document.getElementById('dispDept').innerText = user.department || 'N/A';
        }
    </script>
</body>
</html>
