<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Location | Geo-Track Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg rounded-4 p-4 text-center">
                    <i class="fas fa-location-dot fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold">Geofence Verification</h3>
                    <p class="text-muted">We need to verify your location to mark attendance for <br><b id="targetEventName">---</b></p>
                    
                    <div id="statusBox" class="alert alert-info py-3">
                        <i class="fas fa-spinner fa-spin me-2"></i> Waiting for GPS...
                    </div>

                    <div id="mapPlaceholder" class="bg-dark text-white mb-4 rounded" style="height: 150px; display: flex; align-items: center; justify-content: center;">
                        <small>GPS Coordinates: <span id="coords">Fetching...</span></small>
                    </div>

                    <button id="verifyBtn" class="btn btn-primary w-100 py-3" onclick="processAttendance()" disabled>
                        VERIFY & MARK PRESENT
                    </button>
                    <a href="dashboard.html" class="btn btn-link mt-3 text-muted text-decoration-none">Cancel and Go Back</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/geofence_handler.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventName = urlParams.get('name');
        
        // इव्हेंटचे नाव पेजवर दाखवण्यासाठी
        if (eventName) {
            document.getElementById('targetEventName').innerText = decodeURIComponent(eventName);
        }

        // geofence_handler.js मधील फंक्शन कॉल करणे
        window.onload = () => {
            if (typeof startLocationTracking === "function") {
                startLocationTracking();
            } else {
                console.error("geofence_handler.js not found or function missing!");
            }
        };
    </script>
</body>
</html>
