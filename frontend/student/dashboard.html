<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard | Geo-Track Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .sidebar { height: 100vh; background: var(--primary); color: white; position: fixed; width: 250px; padding: 20px; }
        .main-content { margin-left: 250px; padding: 30px; }
        .nav-link { color: #cbd5e1; padding: 12px; border-radius: 8px; margin-bottom: 5px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .stat-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .event-card { border-left: 5px solid var(--accent); transition: 0.3s; background: white; border-radius: 12px; padding: 15px; }
        .event-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 class="fw-bold text-accent mb-4">STUDENT</h3>
    <nav>
        <a href="dashboard.html" class="nav-link active"><i class="fas fa-home me-2"></i> Dashboard</a>
        <a href="history.html" class="nav-link"><i class="fas fa-history me-2"></i> Attendance History</a>
        <a href="statistics.html" class="nav-link"><i class="fas fa-chart-pie me-2"></i> Statistics & Certificate</a>
        <a href="violations.html" class="nav-link"><i class="fas fa-exclamation-triangle me-2"></i> Violation Logs</a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user me-2"></i> Profile</a>
        <hr>
        <a href="#" onclick="logout()" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="welcomeText" class="fw-bold">Hello, Student</h2>
        <div id="userBadge" class="badge bg-primary p-2">Department</div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <small class="text-muted">Attendance Percentage</small>
                <h2 id="percentDisplay" class="fw-bold text-accent">0%</h2>
                <div class="progress mt-2" style="height: 8px;">
                    <div id="percentBar" class="progress-bar bg-accent" style="width: 0%"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <small class="text-muted">Total Events Attended</small>
                <h2 id="totalAttended" class="fw-bold">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <small class="text-muted">Certificate Status</small>
                <h2 id="certStatus" class="fw-bold text-warning">Not Eligible</h2>
            </div>
        </div>
    </div>

    <h4 class="fw-bold mb-3">Available & Ongoing Events</h4>
    <div id="eventsList" class="row">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Checking for active events...</p>
        </div>
    </div>
</div>

<script src="../js/auth_handler.js"></script>

<script>
    window.onload = async () => {
        const user = JSON.parse(localStorage.getItem('user'));
        
        // Security: Redirect if not student
        if(!user || user.role !== 'student') {
            window.location.replace('../index.html');
            return;
        }

        document.getElementById('welcomeText').innerText = `Hello, ${user.name}`;
        document.getElementById('userBadge').innerText = user.department;

        await loadDashboardData(user.email);
    };

    async function loadDashboardData(email) {
        try {
            // 1. Fetch Stats
            const statsRes = await fetch(`http://localhost:5000/api/student-stats?email=${email}`);
            const stats = await statsRes.json();
            
            const perc = stats.totalEvents > 0 ? Math.round((stats.attended / stats.totalEvents) * 100) : 0;
            document.getElementById('percentDisplay').innerText = perc + "%";
            document.getElementById('percentBar').style.width = perc + "%";
            document.getElementById('totalAttended').innerText = stats.attended;
            
            if(perc >= 75) {
                document.getElementById('certStatus').innerText = "Eligible";
                document.getElementById('certStatus').className = "fw-bold text-success";
            }

            // 2. Fetch Events
            const eventRes = await fetch('http://localhost:5000/api/events');
            const events = await eventRes.json();
            const list = document.getElementById('eventsList');
            
            if(events.length === 0) {
                list.innerHTML = `<div class="col-12 text-center text-muted">No active events found.</div>`;
                return;
            }

            list.innerHTML = events.map(ev => `
                <div class="col-md-6 mb-3">
                    <div class="event-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="fw-bold mb-1">${ev.name}</h5>
                                <p class="text-muted small mb-0"><i class="fas fa-map-marker-alt me-1"></i> ${ev.radius}m Geofence</p>
                            </div>
                            <a href="event_details.html?id=${ev.id}" class="btn btn-sm btn-outline-primary px-3">Details</a>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            console.error("Dashboard error:", err);
            document.getElementById('eventsList').innerHTML = `<div class="alert alert-danger">Failed to connect to server.</div>`;
        }
    }
</script>
</body>
</html>
