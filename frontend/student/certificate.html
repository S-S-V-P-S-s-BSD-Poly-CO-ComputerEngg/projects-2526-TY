<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate | Geo-Track Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .certificate-border { border: 15px double var(--primary); padding: 50px; background: white; position: relative; }
        .watermark { position: absolute; opacity: 0.05; font-size: 5rem; top: 30%; left: 15%; transform: rotate(-30deg); }
        .locked-msg { background: rgba(255,255,255,0.9); position: absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div id="certificateWrapper" class="position-relative">
            <div id="lockOverlay" class="locked-msg" style="display: none;">
                <i class="fas fa-lock fa-4x text-danger mb-3"></i>
                <h3 class="fw-bold">Certificate Locked!</h3>
                <p>Maintain at least 75% attendance to unlock your certificate.</p>
            </div>

            <div class="certificate-border text-center">
                <div class="watermark">GEO-TRACK PRO</div>
                <h1 style="font-family: serif; font-size: 3.5rem;">Certificate of Participation</h1>
                <p class="mt-4 fs-5">This is to officially certify that</p>
                <h2 id="studentName" class="display-4 fw-bold text-accent my-4 underline">Student Name</h2>
                <p class="fs-5">has achieved the required geofence attendance criteria for the events held.</p>
                <div class="row mt-5">
                    <div class="col-6">
                        <hr class="w-50 mx-auto">
                        <p>System Generated Date</p>
                    </div>
                    <div class="col-6">
                        <hr class="w-50 mx-auto">
                        <p>Authorized Signature</p>
                    </div>
                </div>
            </div>
        </div>
        <button id="downloadPdf" class="btn-auth mt-4" disabled>Download Official PDF</button>
    </div>

    <script src="../js/student_features.js"></script>
    <script>
        window.onload = checkCertificateEligibility;
    </script>
</body>
</html>
