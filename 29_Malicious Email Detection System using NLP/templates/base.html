<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Malicious Email Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg custom-navbar">
  <div class="container">

    <!-- LEFT: LOGO + NAME -->
    <div class="navbar-left d-flex align-items-center">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
        <a class="site-name" href="/">Mail Defender</a>
    </div>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- RIGHT MENU -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/check">Check Email</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/history">History</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/contact">Contact</a>
        </li>


      </ul>
    </div>

  </div>
</nav>


<!-- ================= PAGE CONTENT ================= -->
<div class="main-content">
    {% block content %}
    {% endblock %}
</div>


<!-- ================= FOOTER ================= -->
<footer class="footer">
    <div class="container text-center">
        <img src="{{ url_for('static', filename='images/logo.png') }}" width="40">
        <p class="mt-2">© 2026 Malicious Email Detection System | Final Year Project</p>
    </div>
</footer>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
